<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evidence Portal – Noise Mate</title>
  <link rel="icon" href="/assets/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #164c78;
      --primary-hover: #0f3a5f;
      --bg: #F8FAFC;
      --card: #FFFFFF;
      --border: #E2E8F0;
      --text: #0F172A;
      --muted: #64748B;
      --input-bg: #F1F5F9;
      --input-text: #1E293B;
      --shadow: 0 20px 25px -5px rgba(0,0,0,0.05), 0 10px 10px -5px rgba(0,0,0,0.02);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0F172A;
        --card: #1E293B;
        --border: rgba(255,255,255,0.07);
        --text: #F1F5F9;
        --muted: #94A3B8;
        --input-bg: rgba(0,0,0,0.25);
        --input-text: #FFFFFF;
        --shadow: 0 25px 50px -12px rgba(0,0,0,0.6);
      }
    }

    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 2.5rem;
      box-shadow: var(--shadow);
    }

    /* ---- Header ---- */
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2.5rem;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo-row img {
      width: 28px;
      height: 28px;
      border-radius: 6px;
    }

    .brand {
      font-weight: 800;
      font-size: 1.1rem;
      color: var(--primary);
      letter-spacing: -0.01em;
    }

    .badge {
      background: rgba(22, 76, 120, 0.1);
      color: var(--primary);
      padding: 0.35rem 0.75rem;
      border-radius: 100px;
      font-size: 0.6rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    @media (prefers-color-scheme: dark) {
      .badge { background: rgba(22, 76, 120, 0.25); color: #7eb8f7; }
    }

    /* ---- Hero ---- */
    .hero {
      text-align: center;
      margin-bottom: 2rem;
    }

    .icon-box {
      width: 68px;
      height: 68px;
      background: var(--input-bg);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
      color: var(--primary);
    }

    .hero h1 {
      font-size: 1.75rem;
      font-weight: 800;
      margin-bottom: 0.4rem;
    }

    .hero p {
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.6;
    }

    /* ---- Form ---- */
    form { display: flex; flex-direction: column; gap: 1.1rem; }

    .field { display: flex; flex-direction: column; gap: 0.35rem; }

    label {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      margin-left: 0.25rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .input-wrap { position: relative; }

    .input-wrap svg {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      opacity: 0.7;
      pointer-events: none;
    }

    input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.9rem 1rem 0.9rem 3rem;
      color: var(--input-text);
      font-size: 0.95rem;
      font-weight: 500;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(22, 76, 120, 0.12);
    }

    input::placeholder { color: var(--muted); opacity: 0.7; }

    .error-msg {
      display: none;
      color: #EF4444;
      font-size: 0.78rem;
      font-weight: 700;
      text-align: center;
      background: rgba(239, 68, 68, 0.1);
      padding: 0.6rem 1rem;
      border-radius: 10px;
    }

    .error-msg.visible { display: block; }

    .submit-btn {
      margin-top: 0.5rem;
      background: var(--primary);
      color: white;
      border: none;
      padding: 1.05rem;
      border-radius: 14px;
      font-weight: 700;
      font-size: 0.98rem;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }

    .submit-btn:hover:not(:disabled) {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    .submit-btn:disabled { opacity: 0.55; cursor: not-allowed; }

    footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.68rem;
      color: var(--muted);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- Header -->
    <div class="card-header">
      <div class="logo-row">
        <img src="/logo.png" alt="Noise Mate" onerror="this.style.display='none'">
        <span class="brand">Noise Mate</span>
      </div>
      <div class="badge">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        SECURE ACCESS
      </div>
    </div>

    <!-- Hero -->
    <div class="hero">
      <div class="icon-box">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
      </div>
      <h1>Evidence Portal</h1>
      <p>Access your secure noise evidence records using the credentials from your PDF report.</p>
    </div>

    <!-- Form -->
    <form id="access-form" novalidate>
      <div class="field">
        <label for="report-id">Report ID</label>
        <div class="input-wrap">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          <input id="report-id" type="text" placeholder="e.g. XYZ123" autocomplete="off" required>
        </div>
      </div>

      <div class="field">
        <label for="pin">Security PIN</label>
        <div class="input-wrap">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input id="pin" type="password" maxlength="6" placeholder="6-digit PIN" required>
        </div>
      </div>

      <div class="error-msg" id="error-msg"></div>

      <button type="submit" class="submit-btn" id="submit-btn">
        <span id="btn-label">Access Report</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </button>
    </form>

    <footer>Authorised access only. All sessions are encrypted and monitored for security purposes.</footer>
  </div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const SUPABASE_URL = 'https://fkludrjnyihdxlzhyofx.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_5x1PVu3hkUTOOitRzs3Bmg_qbUU2ioj';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById('access-form');
    const errorMsg = document.getElementById('error-msg');
    const submitBtn = document.getElementById('submit-btn');
    const btnLabel = document.getElementById('btn-label');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
    }

    function hideError() {
      errorMsg.classList.remove('visible');
    }

    async function handleAccess(e) {
      e.preventDefault();
      hideError();

      const reportId = document.getElementById('report-id').value.trim().toUpperCase();
      const pin = document.getElementById('pin').value.trim();

      if (!reportId || !pin) {
        showError('Please enter both Report ID and PIN.');
        return;
      }

      // Disable button and show loading state
      submitBtn.disabled = true;
      btnLabel.textContent = 'Verifying...';

      try {
        // Verify credentials against Supabase
        const { data, error } = await supabase
          .from('complaints')
          .select('id, report_id, security_pin')
          .or(`report_id.eq.${reportId},id.eq.${reportId}`)
          .single();

        if (error || !data) {
          showError('Report not found. Please check your Report ID.');
          return;
        }

        if (String(data.security_pin) !== String(pin)) {
          showError('Incorrect PIN. Please try again.');
          return;
        }

        // Success — navigate to the report detail page in the Next.js portal
        const portalId = data.report_id || data.id;
        window.location.href = '/portal/reports/' + portalId + '?pin=' + encodeURIComponent(pin);

      } catch (err) {
        showError('An unexpected error occurred. Please try again.');
        console.error(err);
      } finally {
        submitBtn.disabled = false;
        btnLabel.textContent = 'Access Report';
      }
    }

    form.addEventListener('submit', handleAccess);
  </script>
</body>
</html>
